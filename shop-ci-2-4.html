<script>
  // ⚠️ Ce script doit être le TOUT PREMIER de la page pour pouvoir détecter
  // l'échec de chargement des scripts CDN suivants (React, Babel, Firebase...).
  function shopciShowError(text){
    var root = document.getElementById('root');
    if (!root) { document.addEventListener('DOMContentLoaded', function(){ shopciShowError(text); }); return; }
    root.innerHTML = '<div style="min-height:100vh;background:#FDEDED;color:#7A1F1F;font-family:monospace;padding:20px;white-space:pre-wrap;font-size:13px;box-sizing:border-box;">'
      + '⚠️ ' + text + '</div>';
  }
  // Capture aussi les erreurs de CHARGEMENT de ressources (script/lien bloqué),
  // qui ne remontent qu'en phase de capture, pas en phase de bulle.
  window.addEventListener('error', function(e){
    if (e.target && e.target.tagName === 'SCRIPT') {
      var fallback = e.target.getAttribute && e.target.getAttribute('data-fallback');
      if (fallback && !e.target.getAttribute('data-fallback-used')) {
        e.target.setAttribute('data-fallback-used', '1');
        e.target.src = fallback;
        return;
      }
      shopciShowError('Une ressource n\'a pas pu se charger (bloquée ou hors ligne) :\n\n' + e.target.src + '\n\nVérifiez votre connexion internet, ou essayez avec un autre navigateur (Chrome de préférence, pas une appli comme WhatsApp/Telegram).');
    } else if (e.message) {
      shopciShowError('Erreur JavaScript — l\'app n\'a pas pu démarrer :\n\n' + e.message + '\n\nFichier: ' + (e.filename||'?') + ' ligne ' + (e.lineno||'?'));
    }
  }, true);
  window.addEventListener('unhandledrejection', function(e){
    shopciShowError('Erreur (promesse rejetée) :\n\n' + (e.reason && e.reason.message ? e.reason.message : e.reason));
  });
  // Filet de sécurité : si rien n'a démarré après 12 secondes, on le dit clairement
  // au lieu de laisser un écran de chargement infini.
  window.__shopciBootTimeout = setTimeout(function(){
    var root = document.getElementById('root');
    if (root && root.innerText.indexOf('Chargement') !== -1) {
      shopciShowError('L\'application met trop de temps à démarrer.\n\nCause la plus probable : une des ressources ci-dessous n\'arrive pas à se charger sur votre réseau (bloquée par l\'opérateur, un pare-feu, ou une appli de messagerie qui bride les scripts externes) :\n- cdn.tailwindcss.com\n- cdn.jsdelivr.net (React / Babel / Firebase)\n\nEssayez d\'ouvrir ce fichier directement dans Chrome (pas depuis WhatsApp/Telegram), avec une connexion internet stable, puis rechargez la page.');
    }
  }, 12000);
</script>

function rand(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }
function pick(arr){ return arr[rand(0,arr.length-1)]; }
function priceFmt(n){ return n.toLocaleString("fr-FR").replace(/,/g," ") + " FCFA"; }
function hashStr(str){ let h=0; for(let i=0;i<str.length;i++){ h=(h*31+str.charCodeAt(i))>>>0; } return h; }
function identityForDevice(deviceId){
  const h = hashStr(deviceId);
  return {
    name: `${FIRST[h % FIRST.length]} ${LAST[Math.floor(h/7) % LAST.length]}`,
    avatar: `https://i.pravatar.cc/150?img=${(h % 70) + 1}`,
    city: CITIES[Math.floor(h/13) % CITIES.length],
  };
}

function genSellers(n){
  const out=[];
  for(let i=0;i<n;i++){
    const badge = BADGES[rand(0,3)];
    out.push({ id:"s"+i, name:`${pick(FIRST)} ${pick(LAST)}`, avatar:`https://i.pravatar.cc/150?img=${(i%70)+1}`,
      badge, city:pick(CITIES), listingsCount:rand(15,20), views:rand(300,9800), sales:rand(2,140), discussions:rand(5,260), verified:Math.random()>0.25 });
  }
  return out;
}
function genListings(sellers){
  const out=[]; let id=0;
  sellers.forEach((seller)=>{
    for(let i=0;i<seller.listingsCount;i++){
      const cat = pick(CATS); const title = pick(TITLES[cat.id]);
      out.push({ id:"l"+id++, title, catId:cat.id, price:rand(cat.min,cat.max), city:seller.city,
        img:`https://picsum.photos/seed/${cat.seed}${id}/480/360`, sellerId:seller.id, views:rand(10,2400), status:"active", createdDaysAgo:rand(0,40) });
    }
  });
  return out;
}

function lsGet(key, fallback){
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch { return fallback; }
}
function lsSet(key, value){ try { localStorage.setItem(key, JSON.stringify(value)); } catch {} }

function getDeviceId(){
  const fresh = "dev_" + Date.now() + "_" + Math.random().toString(36).slice(2,10);
  try {
    let id = localStorage.getItem("shopci_deviceId");
    if (!id) { id = fresh; localStorage.setItem("shopci_deviceId", id); }
    return id;
  } catch (e) {
    // localStorage bloqué (navigateur privé, webview restreinte type WhatsApp/Telegram, cookies tiers désactivés…)
    return fresh;
  }
}

function Referral({ onNext }) {
  const [code, setCode] = useState("");
  const [error, setError] = useState("");
  const VALID_CODE = "CD-2026-SHOP";
  const submit = () => {
    if (code.trim() === "") { onNext(""); return; }

  return (
    <div className="min-h-screen flex flex-col px-6 py-8" style={{ background:T.sand }}>

/* ================= SUBSCRIPTION MODAL (with Wave receipt capture) ================= */
function SubscriptionModal({ onClose, onRequestSubmitted }) {
  const [plan, setPlan] = useState("m1");
  const [step, setStep] = useState("choose"); // choose | pay | receipt | sent
  const [receipt, setReceipt] = useState(null); // dataURL
  const fileRef = useRef(null);
  const plans = [{ key:"w2", label:"2 semaines", price:2000 }, { key:"m1", label:"1 mois", price:4000 }];
  const active = plans.find((p)=>p.key===plan);

  const handleFile = (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => setReceipt(reader.result);
    reader.readAsDataURL(file);
  };

  const [sending, setSending] = useState(false);
  const [error, setError] = useState("");

  const submitRequest = () => {
    if (!db) { setError("Firebase indisponible — impossible d'envoyer la demande pour le moment."); return; }
    setSending(true); setError("");
    db.collection("subscriptionRequests").add({
      deviceId: DEVICE_ID, plan: active.label, price: active.price, receipt: receipt || null,
      status: "pending", createdAt: firebase.firestore.FieldValue.serverTimestamp()
    }).then(()=>{
      setSending(false); setStep("sent");
      setTimeout(()=>onRequestSubmitted(), 900);
    }).catch((err)=>{
      setSending(false); setError("Échec de l'envoi — vérifiez votre connexion internet et réessayez.");
    });
  };

  return (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-black/50 backdrop-blur-sm px-4">
      <div className="w-full max-w-sm rounded-t-3xl sm:rounded-3xl bg-white p-6 relative" style={{ animation:"slideUp 0.3s ease", maxHeight:"92vh", overflowY:"auto" }}>
        <button onClick={onClose} className="absolute top-4 right-4 w-8 h-8 rounded-full flex items-center justify-center" style={{ background:"#F2EEE6" }}>
          <Icon name="x" size={16} color={T.charcoal}/>
        </button>

        {step === "choose" && (
          <>
            <div className="w-11 h-11 rounded-xl flex items-center justify-center mb-4" style={{ background:`${T.gold}20` }}><Icon name="crown" size={20} color={T.gold}/></div>
            <h3 className="disp text-xl font-bold mb-1" style={{ color:T.charcoal }}>Passez Premium</h3>
            <p className="text-sm mb-5" style={{ color:"#6B655C" }}>Publications illimitées, badge vérifié et visibilité maximale sur vos annonces.</p>
            <div className="space-y-3 mb-5">
              {plans.map((p)=>(
                <button key={p.key} onClick={()=>setPlan(p.key)} className="w-full flex items-center justify-between p-4 rounded-2xl text-left transition-all"
                  style={{ border: plan===p.key?`2px solid ${T.papaya}`:`1.5px solid ${T.line}`, background: plan===p.key?`${T.papaya}08`:"white" }}>
                  <div><div className="font-semibold text-sm" style={{ color:T.charcoal }}>{p.label}</div><div className="text-xs" style={{ color:"#8A8378" }}>Publications illimitées</div></div>
                  <div className="disp font-bold" style={{ color:T.papaya }}>{priceFmt(p.price)}</div>
                </button>
              ))}
            </div>
            <button onClick={()=>setStep("pay")} className="w-full py-3.5 rounded-xl font-semibold text-white active:scale-95 transition-transform" style={{ background:T.papaya }}>
              Continuer avec {active.label} — {priceFmt(active.price)}
            </button>
          </>
        )}

        {step === "pay" && (
          <>
            <button onClick={()=>setStep("choose")} className="mb-3 flex items-center gap-1 text-xs font-medium" style={{ color:"#8A8378" }}><Icon name="arrowLeft" size={13}/> Retour</button>
            <div className="w-11 h-11 rounded-xl flex items-center justify-center mb-4" style={{ background:"#00A86B15" }}><span className="font-bold text-sm" style={{ color:"#00A86B" }}>Wave</span></div>
            <h3 className="disp text-xl font-bold mb-1" style={{ color:T.charcoal }}>1. Effectuez le paiement</h3>
            <p className="text-sm mb-5" style={{ color:"#6B655C" }}>Copiez ces informations et ouvrez votre application Wave pour envoyer {priceFmt(active.price)}.</p>
            <div className="rounded-2xl p-4 mb-5 space-y-2" style={{ background:"#F2EEE6" }}>
              <div className="flex justify-between items-center text-sm">
                <span style={{ color:"#8A8378" }}>Numéro Wave</span>
                <span className="font-semibold flex items-center gap-2" style={{ color:T.charcoal }}>
                  225 07 97 19 32 25
                  <button onClick={()=>navigator.clipboard && navigator.clipboard.writeText("2250797193225")} className="text-[10px] px-2 py-1 rounded-full text-white" style={{ background:T.papaya }}>Copier</button>
                </span>
              </div>
              <div className="flex justify-between text-sm"><span style={{ color:"#8A8378" }}>Nom de l'agent</span><span className="font-semibold" style={{ color:T.charcoal }}>KOUADIO A</span></div>
              <div className="flex justify-between text-sm"><span style={{ color:"#8A8378" }}>Montant</span><span className="font-semibold" style={{ color:T.papaya }}>{priceFmt(active.price)}</span></div>
            </div>
            <button onClick={()=>setStep("receipt")} className="w-full py-3.5 rounded-xl font-semibold text-white active:scale-95 transition-transform" style={{ background:"#00A86B" }}>
              J'ai effectué le paiement
            </button>
            <p className="text-[11px] text-center mt-3" style={{ color:"#A39C90" }}>Étape suivante : ajoutez la capture du reçu de paiement.</p>
          </>
        )}

        {step === "receipt" && (
          <>
            <button onClick={()=>setStep("pay")} className="mb-3 flex items-center gap-1 text-xs font-medium" style={{ color:"#8A8378" }}><Icon name="arrowLeft" size={13}/> Retour</button>

            <input ref={fileRef} type="file" accept="image/*" capture="environment" onChange={handleFile} className="hidden"/>
            {!receipt ? (
              <button onClick={()=>fileRef.current && fileRef.current.click()} className="w-full h-40 rounded-2xl flex flex-col items-center justify-center gap-2 mb-5" style={{ background:"#F2EEE6", border:`1.5px dashed ${T.line}` }}>
                <Icon name="upload" size={22} color="#A39C90"/>
                <span className="text-xs" style={{ color:"#A39C90" }}>Importer la capture du reçu</span>
              </button>
            ) : (
              <div className="relative mb-5">
                <img src={receipt} alt="Reçu Wave" className="w-full max-h-56 object-contain rounded-2xl" style={{ border:`1.5px solid ${T.line}` }}/>
                <button onClick={()=>fileRef.current && fileRef.current.click()} className="absolute bottom-2 right-2 text-[11px] font-semibold px-3 py-1.5 rounded-full text-white" style={{ background:T.charcoal }}>Changer</button>
              </div>
            )}

            <button disabled={!receipt || sending} onClick={submitRequest} className="w-full py-3.5 rounded-xl font-semibold text-white disabled:opacity-40 active:scale-95 transition-transform" style={{ background:T.papaya }}>
              {sending ? "Envoi en cours…" : "Envoyer ma demande d'abonnement"}
            </button>
            {error && <p className="text-xs text-center mt-2" style={{ color:"#D64545" }}>{error}</p>}
            <p className="text-[11px] text-center mt-3" style={{ color:"#A39C90" }}>L'administrateur va vérifier votre reçu et activer votre abonnement.</p>
          </>

        {step === "sent" && (
          <div className="py-8 flex flex-col items-center text-center">
            <div className="w-14 h-14 rounded-full flex items-center justify-center mb-4" style={{ background:`${T.gold}20` }}><Icon name="clock" size={26} color={T.gold}/></div>

            <p className="text-sm" style={{ color:"#8A8378" }}>Votre abonnement sera activé dès que l'administrateur aura vérifié votre reçu de paiement.</p>
          </div>
        )}
      </div>
    </div>
  );
}

            <div className="flex gap-2 mt-3">
              <button onClick={()=>onDecision(p.id,"accepted")} className="flex-1 py-2 rounded-lg text-xs font-semibold text-white flex items-center justify-center gap-1" style={{ background:T.green }}><Icon name="check" size={13} color="#fff"/> Accepter</button>
              <button onClick={()=>setRefuseTarget(p.id)} className="flex-1 py-2 rounded-lg text-xs font-semibold flex items-center justify-center gap-1" style={{ background:"#F2EEE6", color:T.charcoal }}><Icon name="ban" size={13} color={T.charcoal}/> Refuser</button>
            </div>
            {refuseTarget === p.id && (
              <div className="mt-3 pt-3" style={{ borderTop:`1px solid ${T.line}` }}>
                <textarea value={refuseMsg} onChange={(e)=>setRefuseMsg(e.target.value)} className="w-full rounded-lg p-2 text-xs outline-none mb-2" rows={2} style={{ border:`1px solid ${T.line}` }}/>
                <button onClick={()=>{ onDecision(p.id,"refused",refuseMsg); setRefuseTarget(null); }} className="w-full py-2 rounded-lg text-xs font-semibold text-white" style={{ background:"#D64545" }}>Envoyer le refus</button>
              </div>
            )}
          </div>
        )))}

        {tab === "subs" && (subRequests.length===0 ? <p className="text-sm text-center py-10" style={{ color:"#A39C90" }}>Aucune demande d'abonnement.</p> : subRequests.map((r)=>(
          <div key={r.id} className="rounded-2xl p-4" style={{ border:`1px solid ${T.line}` }}>
            <div className="flex justify-between items-start mb-3">
              <div><div className="font-semibold text-sm" style={{ color:T.charcoal }}>Plan {r.plan}</div><div className="text-xs" style={{ color:"#8A8378" }}>{priceFmt(r.price)}</div></div>
              <span className="text-[10px] font-semibold px-2 py-1 rounded-full" style={{
                background: r.status==="pending" ? `${T.gold}20` : r.status==="accepted" ? `${T.green}20` : "#D6454520",
                color: r.status==="pending" ? "#8A6A0E" : r.status==="accepted" ? T.green : "#D64545" }}>
                {r.status==="pending"?"En attente":r.status==="accepted"?"Approuvé":"Refusé"}
              </span>
            </div>
            {r.receipt && (
              <img src={r.receipt} onClick={()=>setZoomImg(r.receipt)} alt="Reçu" className="w-full h-40 object-cover rounded-xl mb-3 cursor-zoom-in" style={{ border:`1px solid ${T.line}` }}/>
            )}
            {r.status === "pending" && (
              <div className="flex gap-2">
                <button onClick={()=>onSubDecision(r.id,"accepted")} className="flex-1 py-2 rounded-lg text-xs font-semibold text-white flex items-center justify-center gap-1" style={{ background:T.green }}><Icon name="check" size={13} color="#fff"/> Approuver</button>
                <button onClick={()=>onSubDecision(r.id,"refused")} className="flex-1 py-2 rounded-lg text-xs font-semibold flex items-center justify-center gap-1" style={{ background:"#F2EEE6", color:T.charcoal }}><Icon name="ban" size={13} color={T.charcoal}/> Refuser</button>
              </div>
            )}
          </div>
        )))}

        {tab === "users" && sellers.slice(0,40).map((s)=>(
          <div key={s.id} className="flex items-center gap-3 rounded-2xl p-3" style={{ border:`1px solid ${T.line}` }}>
            <img src={s.avatar} className="w-10 h-10 rounded-full object-cover"/>
            <div className="flex-1"><div className="text-sm font-semibold" style={{ color:T.charcoal }}>{s.name}</div><div className="text-xs" style={{ color:"#8A8378" }}>{s.listingsCount} annonces • {s.city}</div></div>
            <select defaultValue={s.badge.key} onChange={(e)=>onGrantSub(s.id, e.target.value)} className="text-xs rounded-lg px-2 py-1.5" style={{ border:`1px solid ${T.line}` }}>
              {BADGES.map((b)=><option key={b.key} value={b.key}>{b.label}</option>)}
            </select>
          </div>
        ))}

        {tab === "listings" && listings.slice(0,60).map((l)=>(
          <div key={l.id} className="flex items-center gap-3 rounded-2xl p-2" style={{ border:`1px solid ${T.line}` }}>
            <img src={l.img} className="w-12 h-12 rounded-lg object-cover"/>
            <div className="flex-1 min-w-0"><div className="text-xs font-semibold truncate" style={{ color:T.charcoal }}>{l.title}</div><div className="text-[11px]" style={{ color:"#8A8378" }}>{priceFmt(l.price)}</div></div>
          </div>
        ))}
      </div>

      {zoomImg && (
        <div className="fixed inset-0 z-[60] bg-black/80 flex items-center justify-center p-6" onClick={()=>setZoomImg(null)}>
          <img src={zoomImg} className="max-w-full max-h-full rounded-xl"/>
        </div>
      )}
    </div>
  );
}

/* ================= SELLER PROFILE ================= */
function SellerProfile({ seller, listings, onClose, onOpenListing }) {
  return (
    <div className="fixed inset-0 z-50 bg-white overflow-y-auto">
      <div className="flex items-center gap-3 px-5 py-4 sticky top-0 bg-white z-10" style={{ borderBottom:`1px solid ${T.line}` }}>
        <button onClick={onClose}><Icon name="arrowLeft" size={20} color={T.charcoal}/></button>
        <h3 className="disp font-bold" style={{ color:T.charcoal }}>Profil vendeur</h3>
      </div>
      <div className="p-5 max-w-md mx-auto">
        <div className="flex flex-col items-center text-center mb-6">
          <img src={seller.avatar} className="w-20 h-20 rounded-full object-cover mb-3"/>
          <div className="flex items-center gap-1.5 mb-1">
            <span className="font-bold" style={{ color:T.charcoal }}>{seller.name}</span>
            {seller.verified && <Icon name="badgeCheck" size={16} color={T.green}/>}
          </div>
          <Badge badge={seller.badge}/>
          <div className="flex items-center gap-1 text-xs mt-2" style={{ color:"#8A8378" }}><Icon name="mapPin" size={12} color="#8A8378"/> {seller.city}</div>
        </div>
        <div className="grid grid-cols-3 gap-2 mb-6">
          {[{label:"Vues",value:seller.views,icon:"eye"},{label:"Ventes",value:seller.sales,icon:"bag"},{label:"Discussions",value:seller.discussions,icon:"chat"}].map((s)=>(
            <div key={s.label} className="rounded-xl p-3 text-center" style={{ background:"#F2EEE6" }}>
              <div className="flex justify-center mb-1"><Icon name={s.icon} size={15} color={T.papaya}/></div>
              <div className="font-bold text-sm" style={{ color:T.charcoal }}>{s.value}</div><div className="text-[10px]" style={{ color:"#8A8378" }}>{s.label}</div>
            </div>
          ))}
        </div>
        <div className="font-semibold text-sm mb-3" style={{ color:T.charcoal }}>{listings.length} annonces</div>
        <div className="grid grid-cols-2 gap-3">{listings.map((l)=><ListingCard key={l.id} listing={l} seller={seller} onOpen={onOpenListing}/>)}</div>
      </div>
    </div>
  );
}

/* ================= LISTING DETAIL ================= */
function ListingDetail({ listing, seller, onClose, onOpenSeller }) {
  return (
    <div className="fixed inset-0 z-50 bg-white overflow-y-auto">
      <div className="relative">
        <img src={listing.img} className="w-full h-64 object-cover"/>
        <button onClick={onClose} className="absolute top-4 left-4 w-9 h-9 rounded-full bg-white/90 flex items-center justify-center"><Icon name="arrowLeft" size={18} color={T.charcoal}/></button>
      </div>
      <div className="p-5 max-w-md mx-auto">
        <h2 className="text-lg font-bold mb-1" style={{ color:T.charcoal }}>{listing.title}</h2>
        <div className="disp text-xl font-bold mb-3" style={{ color:T.papaya }}>{priceFmt(listing.price)}</div>
        <div className="flex items-center gap-3 text-xs mb-5" style={{ color:"#8A8378" }}>
          <span className="flex items-center gap-1"><Icon name="mapPin" size={12} color="#8A8378"/> {listing.city}</span>
          <span className="flex items-center gap-1"><Icon name="eye" size={12} color="#8A8378"/> {listing.views} vues</span>
          <span className="flex items-center gap-1"><Icon name="clock" size={12} color="#8A8378"/> il y a {listing.createdDaysAgo}j</span>
        </div>
        {seller && (
          <button onClick={()=>onOpenSeller(seller)} className="w-full flex items-center gap-3 rounded-2xl p-3 mb-5 text-left" style={{ border:`1px solid ${T.line}` }}>
            <img src={seller.avatar} className="w-11 h-11 rounded-full object-cover"/>
            <div className="flex-1">
              <div className="text-sm font-semibold flex items-center gap-1" style={{ color:T.charcoal }}>{seller.name} {seller.verified && <Icon name="badgeCheck" size={13} color={T.green}/>}</div>
              <Badge badge={seller.badge}/>
            </div>
            <Icon name="chevronRight" size={16} color="#C7C0B4"/>
          </button>
        )}
        <button className="w-full py-3.5 rounded-xl font-semibold text-white flex items-center justify-center gap-2" style={{ background:T.green }}><Icon name="chat" size={16} color="#fff"/> Contacter le vendeur</button>
      </div>
    </div>
  );
}

/* ================= MARKETPLACE ================= */
function Marketplace() {
  const [sellers] = useState(()=>genSellers(60));
  const [listings] = useState(()=>genListings(sellers));
  const [activeCat, setActiveCat] = useState("all");
  const [query, setQuery] = useState("");
  const [openListing, setOpenListing] = useState(null);
  const [openSeller, setOpenSeller] = useState(null);
  const [showPublish, setShowPublish] = useState(false);
  const [showAdminLogin, setShowAdminLogin] = useState(false);
  const [showAdmin, setShowAdmin] = useState(false);
  const [showSubModal, setShowSubModal] = useState(false);

  const [sub, setSub] = useState(null);
  const [pending, setPending] = useState([]);
  const [userListings, setUserListings] = useState([]); // annonces publiées, partagées via Firestore
  const [subRequests, setSubRequests] = useState([]);
  const [sellerBadges, setSellerBadges] = useState({});
  const [fbError, setFbError] = useState("");

  // Écoute en temps réel des collections Firestore — synchronisé entre tous les appareils
  useEffect(() => {
    if (!db) { setFbError("Firebase indisponible" + (window.__fbInitError ? (" — " + window.__fbInitError) : " — vérifiez votre connexion internet") + ". L'app fonctionne en mode démo (annonces simulées uniquement)."); return; }
    const unsubSub = db.collection("subscriptions").doc(DEVICE_ID).onSnapshot(
      (doc)=>setSub(doc.exists ? doc.data() : null),
      ()=>setFbError("Connexion à Firebase impossible — vérifiez votre connexion internet.")
    );
    const unsubPending = db.collection("pendingListings").orderBy("createdAt","desc").onSnapshot(
      (snap)=>setPending(snap.docs.map((d)=>({ id:d.id, ...d.data() }))),
      ()=>setFbError("Connexion à Firebase impossible — vérifiez votre connexion internet.")
    );
    const unsubListings = db.collection("listings").orderBy("createdAt","desc").onSnapshot(
      (snap)=>setUserListings(snap.docs.map((d)=>({ id:d.id, ...d.data() }))),
      ()=>setFbError("Connexion à Firebase impossible — vérifiez votre connexion internet.")
    );
    const unsubSubReq = db.collection("subscriptionRequests").orderBy("createdAt","desc").onSnapshot(
      (snap)=>setSubRequests(snap.docs.map((d)=>({ id:d.id, ...d.data() }))),
      ()=>setFbError("Connexion à Firebase impossible — vérifiez votre connexion internet.")
    );
    return ()=>{ unsubSub(); unsubPending(); unsubListings(); unsubSubReq(); };
  }, []);

  const refreshSubRequests = () => {}; // conservé pour compatibilité — la synchro est déjà en temps réel

  const allListings = useMemo(()=>[...userListings, ...listings], [userListings, listings]);
  const filtered = useMemo(()=>allListings.filter((l)=>{
    if (activeCat !== "all" && l.catId !== activeCat) return false;
    if (query && !l.title.toLowerCase().includes(query.toLowerCase())) return false;
    return true;
  }), [allListings, activeCat, query]);

  const meListingsCount = userListings.filter((l)=>l.deviceId===DEVICE_ID).length;
  const sellerFor = (id) => {
    const mock = sellers.find((s)=>s.id===id);
    if (mock) return mock;
    if (id === DEVICE_ID || id === "me") return { id:DEVICE_ID, name:"Vous", avatar:"https://i.pravatar.cc/150?img=68", badge: sub ? BADGES.find(b=>b.label===sub.plan) || BADGES[3] : BADGES[0], city:"Abidjan", views:12, sales:0, discussions:0, verified:false, listingsCount:meListingsCount };
    // Annonce publiée par un autre appareil/utilisateur réel — identité générée mais cohérente (pas encore de comptes)
    const identity = identityForDevice(id);
    return { id, ...identity, badge:BADGES[0], views:rand(20,600), sales:rand(0,15), discussions:rand(0,30), verified:false, listingsCount:userListings.filter((l)=>l.deviceId===id).length || 1 };
  };

  const handlePublish = (data) => {
    setShowPublish(false);
    if (!db) { setFbError("Firebase indisponible — impossible de publier pour le moment."); return; }
    const img = `https://picsum.photos/seed/${Date.now()}/480/360`;
    if (sub) {
      db.collection("listings").add({ ...data, img, sellerId:DEVICE_ID, deviceId:DEVICE_ID, views:0, status:"active", createdDaysAgo:0, createdAt: firebase.firestore.FieldValue.serverTimestamp() })
        .catch(()=>setFbError("Échec de la publication — vérifiez votre connexion internet."));
    } else {
      db.collection("pendingListings").add({ ...data, deviceId:DEVICE_ID, status:"pending", createdAt: firebase.firestore.FieldValue.serverTimestamp() })
        .catch(()=>setFbError("Échec de l'envoi pour validation — vérifiez votre connexion internet."));
    }
  };

  const handleAdminDecision = (id, decision, message) => {
    if (!db) { setFbError("Firebase indisponible."); return; }
    const item = pending.find((p)=>p.id===id);
    db.collection("pendingListings").doc(id).delete().catch(()=>setFbError("Échec de la mise à jour — réessayez."));
    if (decision === "accepted" && item) {
      const img = `https://picsum.photos/seed/${Date.now()}/480/360`;
      db.collection("listings").add({ title:item.title, catId:item.catId, price:item.price, city:item.city, img, sellerId:item.deviceId, deviceId:item.deviceId, views:0, status:"active", createdDaysAgo:0, createdAt: firebase.firestore.FieldValue.serverTimestamp() })
        .catch(()=>setFbError("Échec de la publication de l'annonce — réessayez."));
    }
    // decision === "refused": message serait envoyé via Cloud Messaging en production
  };

  const handleSubDecision = (id, decision) => {
    if (!db) { setFbError("Firebase indisponible."); return; }
    const req = subRequests.find((r)=>r.id===id);
    db.collection("subscriptionRequests").doc(id).update({ status:decision }).catch(()=>setFbError("Échec de la mise à jour — réessayez."));
    if (decision === "accepted" && req) {
      db.collection("subscriptions").doc(req.deviceId).set({ plan:req.plan, price:req.price, activatedAt:new Date().toISOString() })
        .catch(()=>setFbError("Échec de l'activation de l'abonnement — réessayez."));
    }
  };

  const handleGrantSub = (sellerId, badgeKey) => setSellerBadges((prev)=>({ ...prev, [sellerId]: BADGES.find((b)=>b.key===badgeKey) }));

  return (
    <div className="min-h-screen pb-24" style={{ background:T.sand }}>
      <div className="sticky top-0 z-30 bg-white" style={{ borderBottom:`1px solid ${T.line}` }}>
        <div className="flex items-center justify-between px-4 py-3 max-w-5xl mx-auto">
          <Logo/>
          <div className="flex items-center gap-2">
            {!sub && (
              <button onClick={()=>setShowSubModal(true)} className="text-xs font-semibold px-3 py-2 rounded-full text-white flex items-center gap-1" style={{ background:T.gold }}>
                <Icon name="crown" size={13} color="#fff"/> Premium
              </button>
            )}
            <button onClick={()=>{ refreshSubRequests(); setShowAdminLogin(true); }} className="w-9 h-9 rounded-full flex items-center justify-center relative" style={{ background:"#F2EEE6" }}>
              <Icon name="shield" size={16} color={T.charcoal}/>
              {(pending.length + subRequests.filter(r=>r.status==="pending").length) > 0 && (
                <span className="absolute -top-1 -right-1 w-4 h-4 rounded-full text-white text-[9px] flex items-center justify-center font-bold" style={{ background:T.papaya }}>
                  {pending.length + subRequests.filter(r=>r.status==="pending").length}
                </span>
              )}
            </button>
            <button onClick={()=>setOpenSeller(sellerFor("me"))} className="w-9 h-9 rounded-full overflow-hidden"><img src="https://i.pravatar.cc/150?img=68" className="w-full h-full object-cover"/></button>
          </div>
        </div>
        <div className="px-4 pb-3 max-w-5xl mx-auto">
          <div className="flex items-center gap-2 rounded-xl px-3 py-2.5" style={{ background:"#F2EEE6" }}>
            <Icon name="search" size={16} color="#A39C90"/>
            <input value={query} onChange={(e)=>setQuery(e.target.value)} placeholder="Rechercher un article, une marque…" className="flex-1 bg-transparent text-sm outline-none"/>
          </div>
        </div>
        <div className="flex gap-2 px-4 pb-3 overflow-x-auto max-w-5xl mx-auto no-scrollbar">
          <button onClick={()=>setActiveCat("all")} className="flex-shrink-0 text-xs font-semibold px-3 py-1.5 rounded-full" style={{ background: activeCat==="all"?T.charcoal:"#F2EEE6", color: activeCat==="all"?"white":"#6B655C" }}>Tout</button>
          {CATS.map((c)=>(
            <button key={c.id} onClick={()=>setActiveCat(c.id)} className="flex-shrink-0 text-xs font-semibold px-3 py-1.5 rounded-full" style={{ background: activeCat===c.id?T.charcoal:"#F2EEE6", color: activeCat===c.id?"white":"#6B655C" }}>{c.label}</button>
          ))}
        </div>
      </div>

      <div className="max-w-5xl mx-auto px-4 pt-4">
        {fbError && (
          <div className="rounded-xl p-3 mb-3 text-xs" style={{ background:"#FDEDED", color:"#B23B3B" }}>{fbError}</div>
        )}
        <div className="text-xs mb-3" style={{ color:"#8A8378" }}>{filtered.length} annonces trouvées</div>
        <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3">
          {filtered.slice(0,100).map((l)=><ListingCard key={l.id} listing={l} seller={sellerFor(l.sellerId)} onOpen={setOpenListing}/>)}
        </div>
      </div>

      <button onClick={()=>setShowPublish(true)} className="fixed bottom-6 right-6 w-14 h-14 rounded-full text-white flex items-center justify-center shadow-2xl active:scale-95 transition-transform z-30" style={{ background:`linear-gradient(135deg, ${T.papaya}, #FF8A5C)` }}>
        <Icon name="plus" size={24} color="#fff"/>
      </button>

      {openListing && <ListingDetail listing={openListing} seller={sellerFor(openListing.sellerId)} onClose={()=>setOpenListing(null)} onOpenSeller={(s)=>{ setOpenListing(null); setOpenSeller(s); }}/>}
      {openSeller && <SellerProfile seller={openSeller} listings={allListings.filter((l)=>l.sellerId===openSeller.id)} onClose={()=>setOpenSeller(null)} onOpenListing={(l)=>{ setOpenSeller(null); setOpenListing(l); }}/>}
      {showPublish && <PublishForm onClose={()=>setShowPublish(false)} onSubmit={handlePublish} subscribed={!!sub}/>}
      {showAdminLogin && <AdminLogin onClose={()=>setShowAdminLogin(false)} onSuccess={()=>{ setShowAdminLogin(false); setShowAdmin(true); }}/>}
      {showAdmin && <AdminPanel onClose={()=>setShowAdmin(false)} pending={pending} subRequests={subRequests} sellers={sellers} listings={allListings} onDecision={handleAdminDecision} onSubDecision={handleSubDecision} onGrantSub={handleGrantSub}/>}
      {showSubModal && <SubscriptionModal onClose={()=>setShowSubModal(false)} onRequestSubmitted={()=>setShowSubModal(false)}/>}
    </div>
  );
}

/* ================= ROOT APP ================= */
function App() {
  const [screen, setScreen] = useState("landing");
  const [showSub, setShowSub] = useState(false);

  if (screen === "landing") return <Landing onContinue={()=>setScreen("auth")}/>;
  if (screen === "auth") return <Auth onDone={()=>setScreen("profileChoice")}/>;
  if (screen === "profileChoice") return <ProfileChoice onChoose={()=>setScreen("referral")}/>;
  if (screen === "referral") return <Referral onNext={()=>{ setScreen("market"); setShowSub(true); }}/>;

  return (
    <>
      <Marketplace/>
      {showSub && <SubscriptionModal onClose={()=>setShowSub(false)} onRequestSubmitted={()=>setShowSub(false)}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
