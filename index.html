<script>
  // ⚠️ Ce script doit être le TOUT PREMIER de la page pour pouvoir détecter
  // l'échec de chargement des scripts CDN suivants (React, Babel, Firebase...).
  function shopciShowError(text){
    var root = document.getElementById('root');
    if (!root) { document.addEventListener('DOMContentLoaded', function(){ shopciShowError(text); }); return; }
    root.innerHTML = '<div style="min-height:100vh;background:#FDEDED;color:#7A1F1F;font-family:monospace;padding:20px;white-space:pre-wrap;font-size:13px;box-sizing:border-box;">'
      + '⚠️ ' + text + '</div>';
  }
  // Capture aussi les erreurs de CHARGEMENT de ressources (script/lien bloqué),
  // qui ne remontent qu'en phase de capture, pas en phase de bulle.
  window.addEventListener('error', function(e){
    if (e.target && e.target.tagName === 'SCRIPT') {
      var fallback = e.target.getAttribute && e.target.getAttribute('data-fallback');
      if (fallback && !e.target.getAttribute('data-fallback-used')) {
        e.target.setAttribute('data-fallback-used', '1');
        e.target.src = fallback;
        return;
      }
      shopciShowError('Une ressource n\'a pas pu se charger (bloquée ou hors ligne) :\n\n' + e.target.src + '\n\nVérifiez votre connexion internet, ou essayez avec un autre navigateur (Chrome de préférence, pas une appli comme WhatsApp/Telegram).');
    } else if (e.message) {
      shopciShowError('Erreur JavaScript — l\'app n\'a pas pu démarrer :\n\n' + e.message + '\n\nFichier: ' + (e.filename||'?') + ' ligne ' + (e.lineno||'?'));
    }
  }, true);
  window.addEventListener('unhandledrejection', function(e){
    shopciShowError('Erreur (promesse rejetée) :\n\n' + (e.reason && e.reason.message ? e.reason.message : e.reason));
  });
  // Filet de sécurité : si rien n'a démarré après 12 secondes, on le dit clairement
  // au lieu de laisser un écran de chargement infini.
  window.__shopciBootTimeout = setTimeout(function(){
    var root = document.getElementById('root');
    if (root && root.innerText.indexOf('Chargement') !== -1) {
      shopciShowError('L\'application met trop de temps à démarrer.\n\nCause la plus probable : une des ressources ci-dessous n\'arrive pas à se charger sur votre réseau (bloquée par l\'opérateur, un pare-feu, ou une appli de messagerie qui bride les scripts externes) :\n- cdn.tailwindcss.com\n- cdn.jsdelivr.net (React / Babel / Firebase)\n\nEssayez d\'ouvrir ce fichier directement dans Chrome (pas depuis WhatsApp/Telegram), avec une connexion internet stable, puis rechargez la page.');
    }
  }, 12000);
</script>

/* ---------------- Compression d'image côté client ----------------
   Nécessaire car Firestore refuse tout document de plus de 1 Mo : une photo
   brute prise avec un téléphone (souvent 3 à 8 Mo) faisait échouer
   silencieusement l'enregistrement. On redimensionne + recompresse en JPEG
   via un <canvas> avant de convertir en dataURL. */
function compressImageFile(file, opts) {
  const maxDim = (opts && opts.maxDim) || 1280;
  const quality = (opts && opts.quality) || 0.72;
  return new Promise((resolve, reject) => {
    if (!file || !file.type || file.type.indexOf("image/") !== 0) {
      reject(new Error("Fichier non pris en charge — choisissez une image.")); return;
    }
    const reader = new FileReader();
    reader.onerror = () => reject(new Error("Lecture du fichier impossible."));
    reader.onload = () => {
      const img = new Image();
      img.onerror = () => reject(new Error("Image invalide ou corrompue."));
      img.onload = () => {
        let { width, height } = img;
        if (width > maxDim || height > maxDim) {
          const scale = maxDim / Math.max(width, height);
          width = Math.round(width * scale);
          height = Math.round(height * scale);
        }
        try {
          const canvas = document.createElement("canvas");
          canvas.width = width; canvas.height = height;
          const ctx = canvas.getContext("2d");
          ctx.drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL("image/jpeg", quality));
        } catch (e) {
          reject(e);
        }
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

/* ---------------- Local persistence (works with a plain HTML file — no backend) ---------------- */
function lsGet(key, fallback){
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch { return fallback; }
}
function lsSet(key, value){ try { localStorage.setItem(key, JSON.stringify(value)); } catch {} }

/* ---------------- Identifiant d'appareil (anonyme, sans compte réel) ---------------- */
function getDeviceId(){
  const fresh = "dev_" + Date.now() + "_" + Math.random().toString(36).slice(2,10);
  try {
    let id = localStorage.getItem("shopci_deviceId");
    if (!id) { id = fresh; localStorage.setItem("shopci_deviceId", id); }
    return id;
  } catch (e) {
    // localStorage bloqué (navigateur privé, webview restreinte type WhatsApp/Telegram, cookies tiers désactivés…)
    return fresh;
  }
}

/* ---------------- UID réel (Firebase Auth) ----------------
   DEVICE_ID est un identifiant local (localStorage), il change si l'appareil
   change ou si le cache est vidé : deux appareils du même utilisateur ne
   partagent pas leurs annonces en attente. currentUid() renvoie le vrai uid
   Firebase Auth (stable, lié au compte, pas à l'appareil) — c'est lui qu'il
   faut utiliser pour tout ce qui doit être filtrable "par utilisateur"
   (annonces en attente, demandes d'abonnement…). Fallback sur DEVICE_ID
   uniquement si jamais appelé avant la connexion (ne devrait pas arriver
   puisque ces actions nécessitent d'être connecté). */
function currentUid(){
  return (auth && auth.currentUser && auth.currentUser.uid) || DEVICE_ID;
}

// Traduit les codes d'erreur Firebase Auth en messages compréhensibles.
function fbAuthErrorMsg(err) {
  const code = err && err.code;
  const map = {
    "auth/invalid-phone-number": "Numéro de téléphone invalide. Vérifiez le format.",
    "auth/missing-phone-number": "Entrez un numéro de téléphone.",
    "auth/too-many-requests": "Trop de tentatives. Réessayez dans quelques minutes.",
    "auth/quota-exceeded": "Quota SMS dépassé, réessayez plus tard.",
    "auth/invalid-verification-code": "Code incorrect. Vérifiez et réessayez.",
    "auth/code-expired": "Le code a expiré, demandez-en un nouveau.",
    "auth/popup-closed-by-user": "Fenêtre Google fermée avant la fin de la connexion.",
    "auth/cancelled-popup-request": "Connexion Google annulée.",
    "auth/popup-blocked": "La fenêtre Google a été bloquée par le navigateur. Autorisez les popups et réessayez.",
    "auth/network-request-failed": "Problème de connexion internet. Réessayez.",
    "auth/unauthorized-domain": "Ce domaine n'est pas autorisé pour la connexion Google.",
  };
  return map[code] || (err && err.message) || "Une erreur est survenue. Réessayez.";
}

function Auth({ onDone }) {
  const [step, setStep] = useState("choice"); // choice | phone | code
  const [phone, setPhone] = useState("");
  const [code, setCode] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [googleLoading, setGoogleLoading] = useState(false);
  const confirmationRef = useRef(null);
  const recaptchaRef = useRef(null);

  const authUnavailable = !auth || !db;

  const saveUserAndContinue = (fbUser, method) => {
    setLoading(true); setError("");
    const payload = {
      method,
      uid: fbUser.uid,
      phone: fbUser.phoneNumber || null,
      email: fbUser.email || null,
      name: fbUser.displayName || null,
      avatar: fbUser.photoURL || null,
    };
    db.collection("users").doc(DEVICE_ID).set({ ...payload, deviceId: DEVICE_ID, createdAt: firebase.firestore.FieldValue.serverTimestamp() }, { merge:true })
      .then(()=>{ setLoading(false); onDone(payload); })
      .catch(()=>{ setLoading(false); setError("Échec de l'enregistrement du profil — vérifiez votre connexion internet et réessayez."); });
  };

  // Prépare (ou réutilise) le reCAPTCHA invisible requis par Firebase pour l'OTP SMS.
  const getRecaptcha = () => {
    if (recaptchaRef.current) return recaptchaRef.current;
    const verifier = new firebase.auth.RecaptchaVerifier("recaptcha-container", { size:"invisible" }, auth);
    recaptchaRef.current = verifier;
    return verifier;
  };

  const sendCode = () => {
    const digits = phone.replace(/\D/g,"");
    if (digits.length < 8) { setError("Entrez un numéro de téléphone valide."); return; }
    if (authUnavailable) { setError("Connexion indisponible — réessayez avec une connexion internet."); return; }
    setLoading(true); setError("");
    const fullPhone = "+225" + digits;
    const verifier = getRecaptcha();
    auth.signInWithPhoneNumber(fullPhone, verifier)
      .then((confirmationResult)=>{
        confirmationRef.current = confirmationResult;
        setLoading(false);
        setStep("code");
      })
      .catch((err)=>{
        setLoading(false);
        setError(fbAuthErrorMsg(err));
        // Un reCAPTCHA raté doit être régénéré avant une nouvelle tentative.
        if (recaptchaRef.current) { recaptchaRef.current.clear(); recaptchaRef.current = null; }
      });
  };

  const verifyCode = () => {
    if (code.replace(/\D/g,"").length < 6) { setError("Entrez le code à 6 chiffres reçu par SMS."); return; }
    if (!confirmationRef.current) { setError("Session expirée, redemandez un code."); setStep("phone"); return; }
    setLoading(true); setError("");
    confirmationRef.current.confirm(code.trim())
      .then((result)=>{ setLoading(false); saveUserAndContinue(result.user, "phone"); })
      .catch((err)=>{ setLoading(false); setError(fbAuthErrorMsg(err)); });
  };

  const signInWithGoogle = () => {
    if (authUnavailable) { setError("Connexion indisponible — réessayez avec une connexion internet."); return; }
    setGoogleLoading(true); setError("");
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider)
      .then((result)=>{ setGoogleLoading(false); saveUserAndContinue(result.user, "google"); })
      .catch((err)=>{ setGoogleLoading(false); setError(fbAuthErrorMsg(err)); });
  };

  return (
    <div className="min-h-screen flex flex-col px-6 py-8" style={{ background:T.sand }}>
      <Logo/>
      {/* Conteneur requis par Firebase pour le reCAPTCHA invisible (OTP SMS). Ne pas retirer. */}
      <div id="recaptcha-container"></div>
      <div className="flex-1 flex flex-col justify-center max-w-sm mx-auto w-full">

        {step !== "code" && (
          <>
            <h2 className="disp text-2xl font-bold mb-1" style={{ color:T.charcoal }}>Créer votre compte</h2>
            <p className="text-sm mb-8" style={{ color:"#6B655C" }}>Rejoignez des milliers de vendeurs et acheteurs ivoiriens. L'inscription est obligatoire pour continuer.</p>
          </>
        )}

        {step === "choice" && (
          <>
            <label className="text-xs font-semibold mb-2 block" style={{ color:T.charcoal }}>Numéro de téléphone</label>
            <div className="flex items-center gap-2 mb-4 rounded-xl px-4 py-3.5 bg-white" style={{ border:`1.5px solid ${error ? "#D64545" : T.line}` }}>
              <span className="text-sm font-semibold" style={{ color:T.charcoal }}>🇨🇮 +225</span>
              <input value={phone} onChange={(e)=>{ setPhone(e.target.value); setError(""); }} onKeyDown={(e)=>{ if(e.key==="Enter") sendCode(); }} placeholder="0000000" className="flex-1 outline-none text-sm bg-transparent" inputMode="numeric"/>
            </div>
            {error && <p className="text-xs mb-3" style={{ color:"#D64545" }}>{error}</p>}
            <button onClick={sendCode} disabled={loading || googleLoading} className="w-full py-3.5 rounded-xl font-semibold text-white mb-4 flex items-center justify-center gap-2 active:scale-95 transition-transform disabled:opacity-60" style={{ background:T.papaya }}>
              {loading ? "Envoi du code…" : "Recevoir le code SMS"}
            </button>
            <div className="flex items-center gap-3 my-2">
              <div className="flex-1 h-px" style={{ background:T.line }}/><span className="text-xs" style={{ color:"#A39C90" }}>ou</span><div className="flex-1 h-px" style={{ background:T.line }}/>
            </div>
            <button onClick={signInWithGoogle} disabled={loading || googleLoading} className="w-full py-3.5 rounded-xl font-semibold flex items-center justify-center gap-2 mt-2 bg-white active:scale-95 transition-transform disabled:opacity-60" style={{ border:`1.5px solid ${T.line}`, color:T.charcoal }}>
              <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.6-6 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 8 3l6-6C34 5.1 29.3 3 24 3 12.4 3 3 12.4 3 24s9.4 21 21 21 21-9.4 21-21c0-1.4-.1-2.7-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 15.9 18.9 13 24 13c3.1 0 5.8 1.1 8 3l6-6C34 5.1 29.3 3 24 3c-7.6 0-14.1 4.3-17.7 10.7z"/><path fill="#4CAF50" d="M24 45c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.2 36.4 26.7 37 24 37c-5.3 0-9.7-3.4-11.3-8l-6.6 5.1C9.8 40.6 16.3 45 24 45z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.3 4.3-4.1 5.6l6.2 5.2C39.9 36.6 43 30.9 43 24c0-1.4-.1-2.7-.4-3.5z"/></svg>
              {googleLoading ? "Connexion…" : "Continuer avec Google"}
            </button>
            <p className="text-[11px] text-center mt-6" style={{ color:"#A39C90" }}>En continuant, vous acceptez les Conditions d'utilisation de Shop CI.</p>
          </>
        )}

        {step === "code" && (
          <>
            <h2 className="disp text-2xl font-bold mb-1" style={{ color:T.charcoal }}>Entrez le code reçu</h2>
            <p className="text-sm mb-8" style={{ color:"#6B655C" }}>Un SMS a été envoyé au 🇨🇮 +225 {phone}. Saisissez le code à 6 chiffres.</p>
            <label className="text-xs font-semibold mb-2 block" style={{ color:T.charcoal }}>Code de vérification</label>
            <div className="flex items-center gap-2 mb-4 rounded-xl px-4 py-3.5 bg-white" style={{ border:`1.5px solid ${error ? "#D64545" : T.line}` }}>
              <input value={code} onChange={(e)=>{ setCode(e.target.value); setError(""); }} onKeyDown={(e)=>{ if(e.key==="Enter") verifyCode(); }} placeholder="000000" maxLength={6} className="flex-1 outline-none text-lg tracking-[0.3em] bg-transparent" inputMode="numeric"/>
            </div>
            {error && <p className="text-xs mb-3" style={{ color:"#D64545" }}>{error}</p>}
            <button onClick={verifyCode} disabled={loading} className="w-full py-3.5 rounded-xl font-semibold text-white mb-4 flex items-center justify-center gap-2 active:scale-95 transition-transform disabled:opacity-60" style={{ background:T.papaya }}>
              {loading ? "Vérification…" : "Valider le code"}
            </button>
            <button onClick={()=>{ setStep("choice"); setCode(""); setError(""); }} className="text-xs text-center" style={{ color:"#6B655C" }}>
              ← Changer de numéro ou renvoyer un code
            </button>
          </>
        )}

      </div>
    </div>
  );
}

function PublishForm({ onClose, onSubmit, subscribed }) {

    setPhotoError("");

      .catch(() => setPhotoError("Une image n'a pas pu être importée, réessayez avec une autre photo."));

    <div className="fixed inset-0 z-50 bg-white overflow-y-auto">

/* ================= ADMIN LOGIN GATE ================= */
// Le panneau admin appelle des écritures (approuver/refuser, activer un
// abonnement) protégées côté serveur par les règles Firestore, qui exigent
// request.auth.token.email == ADMIN_EMAIL. Il faut donc une vraie connexion
// Firebase Auth (Google) avec ce compte précis — une simple saisie de texte
// ne suffit plus et ne protège rien côté serveur.
function AdminLogin({ onSuccess, onClose }) {
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");

  const submit = () => {
    if (!auth) { setError("Connexion indisponible — réessayez avec une connexion internet."); return; }
    setLoading(true); setError("");
    const provider = new firebase.auth.GoogleAuthProvider();
    provider.setCustomParameters({ login_hint: ADMIN_EMAIL });
    auth.signInWithPopup(provider)
      .then((result) => {
        setLoading(false);
        const email = (result.user.email || "").trim().toLowerCase();
        if (email === ADMIN_EMAIL) { onSuccess(); }
        else {
          setError("Accès refusé — ce compte Google n'est pas administrateur.");
          auth.signOut().catch(()=>{});
        }
      })
      .catch((err) => { setLoading(false); setError(fbAuthErrorMsg(err)); });
  };

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm px-4">
      <div className="w-full max-w-sm rounded-3xl bg-white p-6 relative">
        <button onClick={onClose} className="absolute top-4 right-4 w-8 h-8 rounded-full flex items-center justify-center" style={{ background:"#F2EEE6" }}><Icon name="x" size={16} color={T.charcoal}/></button>
        <div className="w-11 h-11 rounded-xl flex items-center justify-center mb-4" style={{ background:`${T.charcoal}10` }}><Icon name="lock" size={20} color={T.charcoal}/></div>
        <h3 className="disp text-xl font-bold mb-1" style={{ color:T.charcoal }}>Connexion administrateur</h3>
        <p className="text-sm mb-5" style={{ color:"#6B655C" }}>Connectez-vous avec le compte Google administrateur pour gérer les annonces et abonnements.</p>
        {error && <p className="text-xs mb-3" style={{ color:"#D64545" }}>{error}</p>}
        <button onClick={submit} disabled={loading} className="w-full py-3.5 rounded-xl font-semibold flex items-center justify-center gap-2 bg-white active:scale-95 transition-transform disabled:opacity-60" style={{ border:`1.5px solid ${T.line}`, color:T.charcoal }}>
          <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.6-6 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 8 3l6-6C34 5.1 29.3 3 24 3 12.4 3 3 12.4 3 24s9.4 21 21 21 21-9.4 21-21c0-1.4-.1-2.7-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 15.9 18.9 13 24 13c3.1 0 5.8 1.1 8 3l6-6C34 5.1 29.3 3 24 3c-7.6 0-14.1 4.3-17.7 10.7z"/><path fill="#4CAF50" d="M24 45c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.2 36.4 26.7 37 24 37c-5.3 0-9.7-3.4-11.3-8l-6.6 5.1C9.8 40.6 16.3 45 24 45z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.3 4.3-4.1 5.6l6.2 5.2C39.9 36.6 43 30.9 43 24c0-1.4-.1-2.7-.4-3.5z"/></svg>
          {loading ? "Connexion…" : "Se connecter avec Google"}
        </button>
        <p className="text-[11px] text-center mt-4" style={{ color:"#A39C90" }}>Seul le compte {ADMIN_EMAIL} a accès au panneau d'administration.</p>
      </div>
    </div>
  );
}

              <div className="font-bold text-sm" style={{ color:T.charcoal }}>{s.value}</div><div className="text-[10px]" style={{ color:"#8A8378" }}>{s.label}</div>
            </div>
          ))}
        </div>
        <div className="font-semibold text-sm mb-3" style={{ color:T.charcoal }}>{listings.length} annonces</div>
        <div className="grid grid-cols-2 gap-3">{listings.map((l)=><ListingCard key={l.id} listing={l} seller={seller} onOpen={onOpenListing}/>)}</div>
      </div>
    </div>
  );
}

/* ================= LISTING DETAIL ================= */

    <div className="fixed inset-0 z-50 bg-white overflow-y-auto">
      <div className="relative">
        <img src={listing.img} className="w-full h-64 object-cover"/>
        <button onClick={onClose} className="absolute top-4 left-4 w-9 h-9 rounded-full bg-white/90 flex items-center justify-center"><Icon name="arrowLeft" size={18} color={T.charcoal}/></button>
      </div>
      <div className="p-5 max-w-md mx-auto">
        <h2 className="text-lg font-bold mb-1" style={{ color:T.charcoal }}>{listing.title}</h2>
        <div className="disp text-xl font-bold mb-3" style={{ color:T.papaya }}>{priceFmt(listing.price)}</div>
        <div className="flex items-center gap-3 text-xs mb-5" style={{ color:"#8A8378" }}>
          <span className="flex items-center gap-1"><Icon name="mapPin" size={12} color="#8A8378"/> {listing.city}</span>
          <span className="flex items-center gap-1"><Icon name="eye" size={12} color="#8A8378"/> {listing.views} vues</span>
          <span className="flex items-center gap-1"><Icon name="clock" size={12} color="#8A8378"/> il y a {listing.createdDaysAgo}j</span>

            <img src={seller.avatar} className="w-11 h-11 rounded-full object-cover"/>
            <div className="flex-1">
              <div className="text-sm font-semibold flex items-center gap-1" style={{ color:T.charcoal }}>{seller.name} {seller.verified && <Icon name="badgeCheck" size={13} color={T.green}/>}</div>
              <Badge badge={seller.badge}/>

            <Icon name="chevronRight" size={16} color="#C7C0B4"/>

        <button className="w-full py-3.5 rounded-xl font-semibold text-white flex items-center justify-center gap-2" style={{ background:T.green }}><Icon name="chat" size={16} color="#fff"/> Contacter le vendeur</button>
      </div>
    </div>
  );
}

/* ================= MARKETPLACE ================= */
function Marketplace() {
  const [sellers] = useState(()=>genSellers(60));
  const [listings] = useState(()=>genListings(sellers));
  const [activeCat, setActiveCat] = useState("all");
  const [query, setQuery] = useState("");
  const [openListing, setOpenListing] = useState(null);
  const [openSeller, setOpenSeller] = useState(null);
  const [showPublish, setShowPublish] = useState(false);
  const [showAdminLogin, setShowAdminLogin] = useState(false);
  const [showAdmin, setShowAdmin] = useState(false);
  const [isAdminSession, setIsAdminSession] = useState(false); // vrai seulement après connexion Google admin réussie
  const [showSubModal, setShowSubModal] = useState(false);
  const [showInbox, setShowInbox] = useState(false);

  const [sub, setSub] = useState(null);
  const [pending, setPending] = useState([]);
  const [userListings, setUserListings] = useState([]); // annonces publiées, partagées via Firestore
  const [subRequests, setSubRequests] = useState([]);
  const [sellerBadges, setSellerBadges] = useState({});
  const [fbError, setFbError] = useState("");

  // Barre du bas : Annonces / En attente / Profil / Boîte
  const [activeTab, setActiveTab] = useState("annonces");
  const [myPending, setMyPending] = useState([]); // mes propres annonces en attente (filtrées par uid)
  const [notifications, setNotifications] = useState([]); // notifications reçues (Boîte)

  // Écoute en temps réel des annonces publiées + de son propre abonnement — pour tout le monde.
  useEffect(() => {
    if (!db) { setFbError("Firebase indisponible" + (window.__fbInitError ? (" — " + window.__fbInitError) : " — vérifiez votre connexion internet") + ". L'app fonctionne en mode démo (annonces simulées uniquement)."); return; }
    const unsubSub = db.collection("subscriptions").doc(DEVICE_ID).onSnapshot(
      (doc)=>setSub(doc.exists ? doc.data() : null),
      ()=>setFbError("Connexion à Firebase impossible — vérifiez votre connexion internet.")
    );
    const unsubListings = db.collection("listings").orderBy("createdAt","desc").onSnapshot(
      (snap)=>setUserListings(snap.docs.map((d)=>({ id:d.id, ...d.data() }))),
      ()=>setFbError("Connexion à Firebase impossible — vérifiez votre connexion internet.")
    );
    return ()=>{ unsubSub(); unsubListings(); };
  }, []);

  // FIX : les annonces en attente et les demandes d'abonnement (avec reçu de
  // paiement) contiennent des infos privées d'autres utilisateurs — on ne les
  // charge donc plus que pour une vraie session admin (Google authentifié),
  // et non plus pour tout le monde dès l'ouverture de l'app.
  useEffect(() => {
    if (!db || !isAdminSession) { setPending([]); setSubRequests([]); return; }
    const unsubPending = db.collection("pendingListings").orderBy("createdAt","desc").onSnapshot(
      (snap)=>setPending(snap.docs.map((d)=>({ id:d.id, ...d.data() }))),
      ()=>setFbError("Connexion à Firebase impossible — vérifiez votre connexion internet.")
    );
    const unsubSubReq = db.collection("subscriptionRequests").orderBy("createdAt","desc").onSnapshot(
      (snap)=>setSubRequests(snap.docs.map((d)=>({ id:d.id, ...d.data() }))),
      ()=>setFbError("Connexion à Firebase impossible — vérifiez votre connexion internet.")
    );
    return ()=>{ unsubPending(); unsubSubReq(); };
  }, [isAdminSession]);

  // Mes propres annonces en attente (onglet "En attente" du bas) — chaque
  // utilisateur ne voit que celles rattachées à son propre uid.
  useEffect(() => {
    if (!db || !auth) { setMyPending([]); return; }
    let unsubSnap = null;
    const unsubAuth = auth.onAuthStateChanged((user) => {
      if (unsubSnap) { unsubSnap(); unsubSnap = null; }
      if (!user) { setMyPending([]); return; }
      unsubSnap = db.collection("pendingListings").where("uid","==",user.uid).onSnapshot(
        (snap)=>setMyPending(snap.docs.map((d)=>({ id:d.id, ...d.data() }))),
        ()=>{}
      );
    });
    return ()=>{ if (unsubSnap) unsubSnap(); unsubAuth(); };
  }, []);

  // Mes notifications (onglet "Boîte" du bas) — annonces/abonnements acceptés
  // ou refusés par l'admin, filtrées par mon propre uid.
  useEffect(() => {
    if (!db || !auth) { setNotifications([]); return; }
    let unsubSnap = null;
    const unsubAuth = auth.onAuthStateChanged((user) => {
      if (unsubSnap) { unsubSnap(); unsubSnap = null; }
      if (!user) { setNotifications([]); return; }
      unsubSnap = db.collection("notifications").where("uid","==",user.uid).orderBy("createdAt","desc").onSnapshot(
        (snap)=>setNotifications(snap.docs.map((d)=>({ id:d.id, ...d.data() }))),
        ()=>{}
      );
    });
    return ()=>{ if (unsubSnap) unsubSnap(); unsubAuth(); };
  }, []);


  const allListings = useMemo(()=>[...userListings, ...listings], [userListings, listings]);
  const filtered = useMemo(()=>allListings.filter((l)=>{
    if (activeCat !== "all" && l.catId !== activeCat) return false;
    if (query && !l.title.toLowerCase().includes(query.toLowerCase())) return false;
    return true;
  }), [allListings, activeCat, query]);

  const meListingsCount = userListings.filter((l)=>l.deviceId===DEVICE_ID).length;
  const sellerFor = (id) => {
    const mock = sellers.find((s)=>s.id===id);
    if (mock) return mock;
    if (id === DEVICE_ID || id === "me") return { id:DEVICE_ID, name:"Vous", avatar:"https://i.pravatar.cc/150?img=68", badge: sub ? BADGES.find(b=>b.label===sub.plan) || BADGES[3] : BADGES[0], city:"Abidjan", views:12, sales:0, discussions:0, verified:!!sub, listingsCount:meListingsCount };
    // Annonce publiée par un autre appareil/utilisateur réel — identité générée mais cohérente (pas encore de comptes)
    const identity = identityForDevice(id);
    return { id, ...identity, badge:BADGES[0], views:rand(20,600), sales:rand(0,15), discussions:rand(0,30), verified:false, listingsCount:userListings.filter((l)=>l.deviceId===id).length || 1 };
  };

  const handlePublish = (data) => {
    setShowPublish(false);
    if (!db) { setFbError("Firebase indisponible — impossible de publier pour le moment."); return; }
    const { photos, ...rest } = data;
    const img = (photos && photos[0]) || `https://picsum.photos/seed/${Date.now()}/480/360`;
    if (sub) {
      db.collection("listings").add({ ...rest, img, sellerId:DEVICE_ID, deviceId:DEVICE_ID, views:0, status:"active", createdDaysAgo:0, createdAt: firebase.firestore.FieldValue.serverTimestamp() })
        .catch(()=>setFbError("Échec de la publication — vérifiez votre connexion internet."));
    } else {
      db.collection("pendingListings").add({ ...rest, img, uid:currentUid(), deviceId:DEVICE_ID, status:"pending", createdAt: firebase.firestore.FieldValue.serverTimestamp() })
        .catch(()=>setFbError("Échec de l'envoi pour validation — vérifiez votre connexion internet."));
    }
  };

  const handleAdminDecision = (id, decision, message) => {
    if (!db) { setFbError("Firebase indisponible."); return; }
    const item = pending.find((p)=>p.id===id);
    db.collection("pendingListings").doc(id).delete().catch(()=>setFbError("Échec de la mise à jour — réessayez."));
    if (decision === "accepted" && item) {
      const img = item.img || `https://picsum.photos/seed/${Date.now()}/480/360`;
      db.collection("listings").add({ title:item.title, catId:item.catId, price:item.price, city:item.city, img, sellerId:item.deviceId, deviceId:item.deviceId, views:0, status:"active", createdDaysAgo:0, createdAt: firebase.firestore.FieldValue.serverTimestamp() })
        .catch(()=>setFbError("Échec de la publication de l'annonce — réessayez."));
    }
    // Notifie le vendeur (via son uid) de la décision — visible dans sa Boîte.
    if (item && item.uid) {
      db.collection("notifications").add({
        uid: item.uid, type:"listing", status: decision,
        title: item.title || "Votre annonce",
        message: decision === "accepted"
          ? `Votre annonce "${item.title}" a été approuvée et est maintenant en ligne.`
          : `Votre annonce "${item.title}" a été refusée.${message ? " Motif : " + message : ""}`,
        read:false, createdAt: firebase.firestore.FieldValue.serverTimestamp()
      }).catch(()=>{});
    }
  };

  const handleSubDecision = (id, decision) => {
    if (!db) { setFbError("Firebase indisponible."); return; }
    const req = subRequests.find((r)=>r.id===id);
    db.collection("subscriptionRequests").doc(id).update({ status:decision }).catch(()=>setFbError("Échec de la mise à jour — réessayez."));
    if (decision === "accepted" && req) {
      db.collection("subscriptions").doc(req.deviceId).set({ plan:req.plan, price:req.price, activatedAt:new Date().toISOString() })
        .catch(()=>setFbError("Échec de l'activation de l'abonnement — réessayez."));
    }
    // Notifie l'utilisateur (via son uid) de la décision sur son abonnement.
    if (req && req.uid) {
      db.collection("notifications").add({
        uid: req.uid, type:"subscription", status: decision,
        title: "Demande d'abonnement",
        message: decision === "accepted"
          ? `Votre abonnement Premium (${req.plan}) a été activé.`
          : `Votre demande d'abonnement Premium (${req.plan}) a été refusée.`,
        read:false, createdAt: firebase.firestore.FieldValue.serverTimestamp()
      }).catch(()=>{});
    }
  };

  const handleGrantSub = (sellerId, badgeKey) => setSellerBadges((prev)=>({ ...prev, [sellerId]: BADGES.find((b)=>b.key===badgeKey) }));

  return (
    <div className="min-h-screen pb-24" style={{ background:T.sand }}>
      <div className="sticky top-0 z-30 bg-white" style={{ borderBottom:`1px solid ${T.line}` }}>
        <div className="flex items-center justify-between px-4 py-3 max-w-5xl mx-auto">
          <Logo/>
          <div className="flex items-center gap-2">
            {!sub && (
              <button onClick={()=>setShowSubModal(true)} className="text-xs font-semibold px-3 py-2 rounded-full text-white flex items-center gap-1" style={{ background:T.gold }}>
                <Icon name="crown" size={13} color="#fff"/> Premium
              </button>
            )}
            <button onClick={()=>setShowAdminLogin(true)} className="w-9 h-9 rounded-full flex items-center justify-center relative" style={{ background:"#F2EEE6" }}>
              <Icon name="shield" size={16} color={T.charcoal}/>
              {isAdminSession && (pending.length + subRequests.filter(r=>r.status==="pending").length) > 0 && (
                <span className="absolute -top-1 -right-1 w-4 h-4 rounded-full text-white text-[9px] flex items-center justify-center font-bold" style={{ background:T.papaya }}>
                  {pending.length + subRequests.filter(r=>r.status==="pending").length}
                </span>
              )}
            </button>
            <button onClick={()=>setOpenSeller(sellerFor("me"))} className="w-9 h-9 rounded-full overflow-hidden"><img src="https://i.pravatar.cc/150?img=68" className="w-full h-full object-cover"/></button>
          </div>
        </div>
        <div className="px-4 pb-3 max-w-5xl mx-auto">
          <div className="flex items-center gap-2 rounded-xl px-3 py-2.5" style={{ background:"#F2EEE6" }}>
            <Icon name="search" size={16} color="#A39C90"/>
            <input value={query} onChange={(e)=>setQuery(e.target.value)} placeholder="Rechercher un article, une marque…" className="flex-1 bg-transparent text-sm outline-none"/>
          </div>
        </div>
        <div className="flex gap-2 px-4 pb-3 overflow-x-auto max-w-5xl mx-auto no-scrollbar">
          <button onClick={()=>setActiveCat("all")} className="flex-shrink-0 text-xs font-semibold px-3 py-1.5 rounded-full" style={{ background: activeCat==="all"?T.charcoal:"#F2EEE6", color: activeCat==="all"?"white":"#6B655C" }}>Tout</button>
          {CATS.map((c)=>(
            <button key={c.id} onClick={()=>setActiveCat(c.id)} className="flex-shrink-0 text-xs font-semibold px-3 py-1.5 rounded-full" style={{ background: activeCat===c.id?T.charcoal:"#F2EEE6", color: activeCat===c.id?"white":"#6B655C" }}>{c.label}</button>
          ))}
        </div>
      </div>

      {activeTab === "annonces" && (
        <div className="max-w-5xl mx-auto px-4 pt-4">
          {fbError && (
            <div className="rounded-xl p-3 mb-3 text-xs" style={{ background:"#FDEDED", color:"#B23B3B" }}>{fbError}</div>
          )}
          <div className="text-xs mb-3" style={{ color:"#8A8378" }}>{filtered.length} annonces trouvées</div>
          <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3">
            {filtered.slice(0,100).map((l)=><ListingCard key={l.id} listing={l} seller={sellerFor(l.sellerId)} onOpen={setOpenListing}/>)}
          </div>
        </div>
      )}

      {activeTab === "attente" && (
        <div className="max-w-5xl mx-auto px-4 pt-4">
          <h2 className="disp text-lg font-bold mb-3" style={{ color:T.charcoal }}>Mes annonces en attente</h2>
          {myPending.length === 0 ? (
            <div className="text-center py-16">
              <Icon name="clock" size={28} color="#C9C2B6"/>
              <p className="text-sm mt-3" style={{ color:"#A39C90" }}>Aucune annonce en attente de validation.</p>
            </div>
          ) : (
            <div className="space-y-3">
              {myPending.map((p)=>(
                <div key={p.id} className="flex items-center gap-3 p-3 rounded-2xl bg-white" style={{ border:`1px solid ${T.line}` }}>
                  {p.img && <img src={p.img} className="w-14 h-14 rounded-xl object-cover flex-shrink-0"/>}
                  <div className="flex-1 min-w-0">
                    <div className="text-sm font-semibold truncate" style={{ color:T.charcoal }}>{p.title}</div>
                    <div className="text-xs" style={{ color:"#8A8378" }}>{p.price ? priceFmt(p.price) : ""}</div>
                  </div>
                  <span className="text-[11px] font-semibold px-2.5 py-1 rounded-full flex-shrink-0" style={{ background:`${T.gold}20`, color:"#8A6A0E" }}>En attente</span>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {activeTab === "annonces" && (
        <button onClick={()=>setShowPublish(true)} className="fixed bottom-24 right-6 w-14 h-14 rounded-full text-white flex items-center justify-center shadow-2xl active:scale-95 transition-transform z-30" style={{ background:`linear-gradient(135deg, ${T.papaya}, #FF8A5C)` }}>
          <Icon name="plus" size={24} color="#fff"/>
        </button>
      )}

      {/* Barre de navigation du bas : Annonces / En attente / Profil / Boîte */}
      <div className="fixed bottom-0 left-0 right-0 z-30 bg-white" style={{ borderTop:`1px solid ${T.line}` }}>
        <div className="max-w-5xl mx-auto grid grid-cols-4">
          {[
            { key:"annonces", label:"Annonces", icon:"list" },
            { key:"attente", label:"En attente", icon:"clock", count: myPending.length },
            { key:"profil", label:"Profil", icon:"user" },
            { key:"boite", label:"Boîte", icon:"inbox", count: notifications.filter(n=>!n.read).length },
          ].map((t)=>(
            <button key={t.key} onClick={()=>{
              if (t.key === "profil") { setOpenSeller(sellerFor("me")); return; }
              if (t.key === "boite") {
                setShowInbox(true);
                if (db) notifications.filter(n=>!n.read).forEach(n=>db.collection("notifications").doc(n.id).update({ read:true }).catch(()=>{}));
                return;
              }
              setActiveTab(t.key);
            }} className="flex flex-col items-center justify-center gap-1 py-2.5 relative">
              <span className="relative">
                <Icon name={t.icon} size={20} color={activeTab===t.key ? T.papaya : "#A39C90"}/>
                {!!t.count && (
                  <span className="absolute -top-1.5 -right-2 w-4 h-4 rounded-full text-white text-[9px] flex items-center justify-center font-bold" style={{ background:T.papaya }}>{t.count}</span>
                )}
              </span>
              <span className="text-[10px] font-semibold" style={{ color: activeTab===t.key ? T.papaya : "#A39C90" }}>{t.label}</span>
            </button>
          ))}
        </div>
      </div>

      {openListing && <ListingDetail listing={openListing} seller={sellerFor(openListing.sellerId)} onClose={()=>setOpenListing(null)} onOpenSeller={(s)=>{ setOpenListing(null); setOpenSeller(s); }}/>}
      {openSeller && <SellerProfile seller={openSeller} listings={allListings.filter((l)=>l.sellerId===openSeller.id)} onClose={()=>setOpenSeller(null)} onOpenListing={(l)=>{ setOpenSeller(null); setOpenListing(l); }}/>}
      {showPublish && <PublishForm onClose={()=>setShowPublish(false)} onSubmit={handlePublish} subscribed={!!sub}/>}
      {showAdminLogin && <AdminLogin onClose={()=>setShowAdminLogin(false)} onSuccess={()=>{ setShowAdminLogin(false); setIsAdminSession(true); setShowAdmin(true); }}/>}
      {showAdmin && <AdminPanel onClose={()=>{ setShowAdmin(false); setIsAdminSession(false); }} pending={pending} subRequests={subRequests} sellers={sellers} listings={allListings} onDecision={handleAdminDecision} onSubDecision={handleSubDecision} onGrantSub={handleGrantSub}/>}
      {showSubModal && <SubscriptionModal onClose={()=>setShowSubModal(false)} onRequestSubmitted={()=>setShowSubModal(false)}/>}
      {showInbox && (
        <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-black/50 backdrop-blur-sm px-4">
          <div className="w-full max-w-sm rounded-t-3xl sm:rounded-3xl bg-white p-6 relative" style={{ animation:"slideUp 0.3s ease", maxHeight:"85vh", overflowY:"auto" }}>
            <button onClick={()=>setShowInbox(false)} className="absolute top-4 right-4 w-8 h-8 rounded-full flex items-center justify-center" style={{ background:"#F2EEE6" }}>
              <Icon name="x" size={16} color={T.charcoal}/>
            </button>
            <div className="w-11 h-11 rounded-xl flex items-center justify-center mb-4" style={{ background:"#F2EEE6" }}><Icon name="inbox" size={20} color={T.charcoal}/></div>
            <h3 className="disp text-xl font-bold mb-4" style={{ color:T.charcoal }}>Boîte de réception</h3>
            {notifications.length === 0 ? (
              <div className="text-center py-10">
                <Icon name="inbox" size={28} color="#C9C2B6"/>
                <p className="text-sm mt-3" style={{ color:"#A39C90" }}>Aucun message pour le moment.</p>
                <p className="text-xs mt-1" style={{ color:"#C9C2B6" }}>Vous serez averti ici quand une annonce ou un abonnement sera accepté ou refusé.</p>
              </div>
            ) : (
              <div className="space-y-2">
                {notifications.map((n)=>(
                  <div key={n.id} className="flex items-start gap-3 p-3 rounded-2xl" style={{ background: n.read ? "#F9F7F2" : `${T.papaya}0D`, border:`1px solid ${T.line}` }}>
                    <div className="w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0" style={{ background: n.status==="accepted" ? `${T.green}20` : "#D6454520" }}>
                      <Icon name={n.status==="accepted" ? "check" : "x"} size={14} color={n.status==="accepted" ? T.green : "#D64545"}/>
                    </div>
                    <div className="flex-1 min-w-0">
                      <div className="text-sm" style={{ color:T.charcoal }}>{n.message}</div>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

/* ================= ROOT APP ================= */
/* ================= BOOT (vérifie la session persistée avant d'afficher quoi que ce soit) ================= */
function BootScreen() {
  return (
    <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"sans-serif", color:"#fff", background:"#14110F", textAlign:"center", padding:24 }}>
      Chargement de Shop CI…
    </div>
  );
}

function App() {
  // "boot" tant qu'on ne sait pas encore si une session Firebase Auth est déjà
  // active (persistance locale) — évite de repasser par l'inscription à
  // chaque visite.
  const [screen, setScreen] = useState("boot");
  const [showSub, setShowSub] = useState(false);

  useEffect(() => {
    if (!auth) { setScreen("landing"); return; }
    const unsub = auth.onAuthStateChanged((user) => {
      if (user) {
        // Déjà connecté : on saute directement à l'accueil du profil déjà
        // fait, ou au choix de profil s'il n'a jamais été terminé.
        const onboarded = lsGet("shopci_onboarded", false);
        setScreen(onboarded ? "market" : "profileChoice");
      } else {
        setScreen("landing");
      }
    });
    return () => unsub();
  }, []);

  if (screen === "boot") return <BootScreen/>;
  if (screen === "landing") return <Landing onContinue={()=>setScreen("auth")}/>;
  if (screen === "auth") return <Auth onDone={()=>setScreen("profileChoice")}/>;
  if (screen === "profileChoice") return <ProfileChoice onChoose={()=>setScreen("referral")}/>;
  if (screen === "referral") return <Referral onNext={()=>{ lsSet("shopci_onboarded", true); setScreen("market"); setShowSub(true); }}/>;

  return (
    <>
      <Marketplace/>
      {showSub && <SubscriptionModal onClose={()=>setShowSub(false)} onRequestSubmitted={()=>setShowSub(false)}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
